  /api/v1/opds:
    get:
      operationId: getOpdsFeed
      summary: OPDS 1.2 acquisition feed of extracted articles
      description: |
        Returns an OPDS 1.2 Atom acquisition feed listing the authenticated
        user's extracted articles (newest first; `extractStatus = ready`;
        excludes archived items by default). Each `<entry>` carries an
        acquisition link pointing at `GET /api/v1/items/{id}/epub`.

        Kobo and other OPDS readers should be pointed at this URL with HTTP
        Basic authentication — any non-empty username, PAT as the password.
        The response content-type is
        `application/atom+xml;profile=opds-catalog;kind=acquisition`.

        Entries carry `http://opds-spec.org/image` (+ `/image/thumbnail`)
        links when a cover is known — the first cached content image, served
        by `GET /api/v1/items/{id}/image/{key}` with the same credentials, or
        the remote lead image as a fallback. The feed paginates via a
        `rel="next"` link (page size 50) and advertises OpenSearch via a
        `rel="search"` link.
      tags: [kobo]
      security:
        - patBasicAuth: []
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          description: |
            Opaque pagination cursor from the previous page's `rel="next"`
            link. Unknown or stale cursors fall back to the first page —
            OPDS devices are hard to debug, so the feed never 400s on paging.
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: |
            Full-text search term (same semantics as the library `q` filter).
            Used by the OpenSearch template; empty result is a valid empty feed.
          schema:
            type: string
      responses:
        "200":
          description: OPDS 1.2 Atom acquisition feed
          content:
            application/atom+xml:
              schema:
                type: string
              examples:
                feed:
                  value: |
                    <?xml version="1.0" encoding="UTF-8"?>
                    <feed xmlns="http://www.w3.org/2005/Atom"
                          xmlns:opds="http://opds-spec.org/2010/catalog">
                      <id>urn:burkmak:opds:user:clxusr001</id>
                      <title>burkmak — My Reading List</title>
                      <updated>2026-06-15T09:00:00Z</updated>
                      <entry>
                        <id>urn:burkmak:item:clxabc123</id>
                        <title>The Case for Reading Slowly</title>
                        <author><name>Example Blog</name></author>
                        <summary>A short excerpt from the article.</summary>
                        <updated>2026-06-15T08:00:00Z</updated>
                        <link rel="http://opds-spec.org/acquisition"
                              type="application/epub+zip"
                              href="/api/v1/items/clxabc123/epub"/>
                      </entry>
                    </feed>
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session

