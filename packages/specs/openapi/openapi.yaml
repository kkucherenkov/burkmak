  /api/v1/export/markdown:
    get:
      operationId: exportMarkdownBundle
      summary: Export all matching items as Obsidian-ready markdown notes
      description: |
        Returns a JSON bundle of markdown-rendered notes for the authenticated
        user's items. By default only items with at least one highlight are
        included. Use `?includeEmpty=true` to include items without highlights.
        Supports filtering by read state and a `since` cursor (items whose
        metadata or highlights changed after that timestamp). Results are
        ordered newest-first.

        Designed to be consumed by the Obsidian plugin; each `ExportedNote`
        contains a stable `filename` and a YAML-frontmatter block whose
        `burkmakId` is the idempotency key for vault writes.
      tags: [export]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: readState
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReadState"
          description: Filter by read state
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: |
            ISO-8601 timestamp; only items updated at or after this instant
            are returned. Useful for incremental sync.
        - name: includeEmpty
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            When `false` (default) only items with at least one highlight are
            returned. Set to `true` to include items without highlights.
      responses:
        "200":
          description: Bundle of markdown notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportBundle"
              examples:
                bundle:
                  value:
                    notes:
                      - itemId: clxabc123
                        title: "The Case for Reading Slowly"
                        filename: "the-case-for-reading-slowly-cmqd.md"
                        markdown: |
                          ---
                          burkmakId: clxabc123
                          title: "The Case for Reading Slowly"
                          url: https://example.com/reading-slowly
                          source: "Example Blog"
                          savedAt: "2026-06-15T08:00:00Z"
                          tags: ["reading"]
                          readingTimeMin: 4
                          ---
                          # [The Case for Reading Slowly](https://example.com/reading-slowly)

                          Example Blog · 2026-06-15 · 4 min read

                          > A short excerpt from the article.

                          ## Highlights

                          > The depth of understanding grows with the pace of reading.
                          > — yellow

                          Important insight to revisit.
        "400":
          description: Invalid query parameters
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badParams:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "since must be a valid ISO-8601 date-time"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session

