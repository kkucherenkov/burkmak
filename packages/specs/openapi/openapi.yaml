openapi: 3.1.0
info:
  title: App API
  version: 0.1.0
  description: |
    Spec-first HTTP API. Paths include the versioned prefix (`/api/v1`) so
    generated clients can be used without additional base-URL rewriting.

    **Authentication endpoints** live under `/api/v1/auth/*` and follow the
    [Better Auth protocol](https://www.better-auth.com/docs). They are
    deliberately not enumerated here: Better Auth owns that wire contract and
    evolves it independently of our OpenAPI surface. The `cookieAuth` and
    `bearerAuth` security schemes documented below describe how the *rest* of
    this API accepts credentials issued by that namespace — session cookies
    (web) and bearer tokens (mobile, via the `bearer` plugin).
  contact:
    name: App Team
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.example.com
    description: Production (placeholder)
tags:
  - name: system
    description: Health and liveness endpoints
  - name: events
    description: Server-Sent Events stream

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Service health probe
      description: |
        Reports health status of the service and its database dependency.
      tags: [system]
      responses:
        "200":
          description: Service and all dependencies are operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
        "503":
          description: One or more dependencies are degraded or down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                degraded:
                  value:
                    status: down
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: down

  /api/v1/events:
    get:
      operationId: streamEvents
      summary: Server-Sent Events stream of the caller's item and job updates
      description: |
        Long-lived `text/event-stream` connection. Each message is a JSON
        payload `{ "type": ..., "data": ... }` describing an item or job change
        for the authenticated user. A periodic `ping` event acts as a heartbeat.
        Requires an active Better Auth session.
      tags: [events]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: An open event stream.
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                update:
                  value: |
                    data: {"type":"item.updated","data":{"id":"itm_1"}}
        "401":
          description: No active session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Better Auth bearer token
  schemas:
    DependencyStatus:
      type: ["string", "null"]
      enum: [ok, degraded, down]

    HealthStatus:
      type: object
      required: [status, version, uptimeSeconds, dependencies]
      properties:
        status:
          $ref: "#/components/schemas/DependencyStatus"
        version:
          type: ["string", "null"]
          description: Semantic version of the running backend build
        uptimeSeconds:
          type: integer
          minimum: 0
          description: Seconds since the backend process started
        dependencies:
          type: object
          required: [db]
          properties:
            db:
              $ref: "#/components/schemas/DependencyStatus"

    Problem:
      type: object
      description: RFC 9457 problem details
      required: [type, title, status]
      properties:
        type:
          type: ["string", "null"]
          format: uri
          default: about:blank
        title:
          type: ["string", "null"]
        status:
          type: integer
          format: int32
        detail:
          type: ["string", "null"]
        instance:
          type: ["string", "null"]
        code:
          type: ["string", "null"]
