                    detail: No active session

  /api/v1/tokens:
    get:
      operationId: listTokens
      summary: List the authenticated user's personal access tokens
      description: |
        Returns all non-revoked personal access tokens for the authenticated
        user. The secret and hash are **never** returned; only the display
        prefix is included for identification.
      tags: [tokens]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: List of personal access tokens (secrets not included)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenList"
              examples:
                list:
                  value:
                    tokens:
                      - id: clxtok001
                        name: "Kobo e-reader"
                        prefix: "burk_pat_ab12"
                        lastUsedAt: "2026-06-14T22:00:00Z"
                        createdAt: "2026-06-01T12:00:00Z"
                      - id: clxtok002
                        name: "Obsidian plugin"
                        prefix: "burk_pat_cd34"
                        lastUsedAt: null
                        createdAt: "2026-06-10T09:00:00Z"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session

    post:
      operationId: createToken
      summary: Create a personal access token
      description: |
        Creates a new personal access token for the authenticated user and
        returns the **full plaintext secret exactly once** — it is not stored
        and cannot be retrieved again. The caller must copy it immediately.

        The token string has the format `burk_pat_` followed by 43 base64url
        characters (32 random bytes). It can be used as:
        - `Authorization: Bearer <token>` (Obsidian, REST clients)
        - HTTP Basic password, any username (OPDS/Kobo clients)
      tags: [tokens]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
            examples:
              kobo:
                value:
                  name: "Kobo e-reader"
              obsidian:
                value:
                  name: "Obsidian plugin"
      responses:
        "201":
          description: |
            Token created. The `token` field contains the full plaintext secret
            — this is the only time it is returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalAccessTokenCreated"
              examples:
                created:
                  value:
                    id: clxtok001
                    name: "Kobo e-reader"
                    prefix: "burk_pat_ab12"
                    token: "burk_pat_ab12XyZ9-kQmNpRvWsLtUeHjFdCgIoBnAcEl"
                    createdAt: "2026-06-15T10:00:00Z"
        "400":
          description: Request body invalid
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "name must be between 1 and 100 characters"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session

  /api/v1/tokens/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Personal access token ID (cuid)

    delete:
      operationId: revokeToken
      summary: Revoke a personal access token
      description: |
        Permanently revokes the token by recording a `revokedAt` timestamp.
        Returns `404` if the token does not exist or is not owned by the
        authenticated user. Immediately invalidates the token; in-flight
        requests using the token may still succeed if they passed the auth
        check before revocation.
      tags: [tokens]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "204":
          description: Token revoked successfully
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Token not found or not owned by the authenticated user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Token clxtok001 does not exist"
                    code: token-not-found

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Better Auth bearer token
    patBasicAuth:
      type: http
      scheme: basic
      description: |
        Personal access token as the HTTP Basic password (username ignored) —
        used by OPDS/Kobo clients. Send any non-empty string as the username
        and the full `burk_pat_…` token as the password.
  schemas:
    DependencyStatus:
      type: ["string", "null"]
      enum: [ok, degraded, down]

    HealthStatus:
      type: object
      required: [status, version, uptimeSeconds, dependencies]
      properties:
        status:
          $ref: "#/components/schemas/DependencyStatus"
        version:
          type: ["string", "null"]
          description: Semantic version of the running backend build
        uptimeSeconds:
          type: integer
          minimum: 0
          description: Seconds since the backend process started
        dependencies:
          type: object
          required: [db]
          properties:
            db:
              $ref: "#/components/schemas/DependencyStatus"

    Problem:
      type: object
      description: RFC 9457 problem details
      required: [type, title, status]
      properties:
        type:
          type: ["string", "null"]
          format: uri
          default: about:blank
        title:
          type: ["string", "null"]
        status:
          type: integer
          format: int32
        detail:
          type: ["string", "null"]
        instance:
          type: ["string", "null"]
        code:
          type: ["string", "null"]

    ItemStatus:
      type: string
      enum: [pending, ready, failed]
      description: Processing status of the item's metadata extraction job

    ReadState:
      type: string
      enum: [unread, read, archived]
      description: The user's read progress for an item

    Item:
      type: object
      required: [id, url, status, extractStatus, readState, favorite, savedAt, tags]
      properties:
        id:
          type: string
          description: Unique item ID (cuid)
        url:
          type: string
          format: uri
          description: Original URL submitted by the user
        canonicalUrl:
          type: ["string", "null"]
          format: uri
          description: Canonical URL resolved during metadata extraction
        title:
          type: ["string", "null"]
          description: Page title
        siteName:
          type: ["string", "null"]
          description: Name of the publishing site
        excerpt:
          type: ["string", "null"]
          description: Short plain-text excerpt
        leadImageUrl:
          type: ["string", "null"]
          format: uri
          description: Hero/lead image URL
        faviconUrl:
          type: ["string", "null"]
          format: uri
          description: Site favicon URL
        status:
          $ref: "#/components/schemas/ItemStatus"
        extractStatus:
          $ref: "#/components/schemas/ExtractStatus"
        readState:
          $ref: "#/components/schemas/ReadState"
        favorite:
          type: boolean
          description: Whether the item is marked as a favourite
        savedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the item was saved
        readAt:
          type: ["string", "null"]
          format: date-time
          description: ISO-8601 timestamp when the item was first marked read
        tags:
          type: array
          items:
            type: string
          description: Slugs of tags attached to this item

    ItemList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        nextCursor:
          type: ["string", "null"]
          description: Opaque cursor for the next page; null when no more pages

    Tag:
      type: object
      required: [id, name, slug, count]
      properties:
        id:
          type: string
          description: Unique tag ID (cuid)
        name:
          type: string
          description: Human-readable tag name (original casing)
        slug:
          type: string
          description: URL-safe lowercase slug derived from name
        count:
          type: integer
          minimum: 0
          description: Number of items carrying this tag

    TagList:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"

    SaveItemRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: URL to save
        tags:
          type: array
          items:
            type: string
          description: Optional tag slugs to attach immediately

    UpdateItemRequest:
      type: object
      minProperties: 1
      description: At least one of `readState` or `favorite` must be provided.
      properties:
        readState:
          $ref: "#/components/schemas/ReadState"
        favorite:
          type: boolean
          description: Set or clear the favourite flag

    AddTagRequest:
      type: object
      required: [tag]
      properties:
        tag:
          type: string
          minLength: 1
          maxLength: 40
          description: Tag name or slug to add (created if absent)

    RenameTagRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
          description: New display name for the tag

    ExtractStatus:
      type: string
      enum: [none, extracting, ready, failed]
      description: Status of the article content extraction job for an item

    ExtractAccepted:
      type: object
      description: Response body returned when an extraction job is accepted (202).
      required: [extractStatus]
      properties:
        extractStatus:
          $ref: "#/components/schemas/ExtractStatus"
      example:
        extractStatus: extracting

    Article:
      type: object
      required: [contentHtml, contentText, wordCount, readingTimeMin, extractedAt]
      properties:
        contentHtml:
          type: string
          description: Full article body as HTML
        contentText:
          type: string
          description: Full article body as plain text (HTML stripped)
        wordCount:
          type: integer
          minimum: 0
          description: Number of words in the extracted article
        readingTimeMin:
          type: integer
          minimum: 1
          description: Estimated reading time in minutes
        extractedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the extraction completed

    HighlightColor:
      type: string
      enum: [yellow, green, blue, pink]
      description: Color label for a text highlight

    Highlight:
      type: object
      required: [id, itemId, quote, prefix, suffix, color, createdAt]
      properties:
        id:
          type: string
          description: Unique highlight ID (cuid)
        itemId:
          type: string
          description: ID of the item this highlight belongs to (cuid)
        quote:
          type: string
          description: The exact text that was highlighted
        prefix:
          type: string
          description: Short text immediately before the highlighted quote (for anchor context)
        suffix:
          type: string
          description: Short text immediately after the highlighted quote (for anchor context)
        note:
          type: ["string", "null"]
          description: Optional reader note attached to the highlight
        color:
          $ref: "#/components/schemas/HighlightColor"
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the highlight was created

    HighlightList:
      type: object
      required: [highlights]
      properties:
        highlights:
          type: array
          items:
            $ref: "#/components/schemas/Highlight"

    CreateHighlightRequest:
      type: object
      required: [quote]
      properties:
        quote:
          type: string
          description: The exact text that was highlighted
        prefix:
          type: string
          description: Short text immediately before the quote (for anchor context)
        suffix:
          type: string
          description: Short text immediately after the quote (for anchor context)
        note:
          type: string
          description: |
            Optional reader note to attach. To clear a note on an existing
            highlight, use `PATCH /highlights/{id}` with `note: null` —
            create only sets a note, it cannot null one.
        color:
          $ref: "#/components/schemas/HighlightColor"

    UpdateHighlightRequest:
      type: object
      minProperties: 1
      description: At least one of `note` or `color` must be provided.
      properties:
        note:
          type: ["string", "null"]
          description: Updated reader note; set to null to clear
        color:
          $ref: "#/components/schemas/HighlightColor"

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Human-readable label for this token (e.g. "Kobo e-reader")

    PersonalAccessToken:
      type: object
      description: A personal access token record (secret and hash are never returned).
      required: [id, name, prefix, createdAt]
      properties:
        id:
          type: string
          description: Unique token ID (cuid)
        name:
          type: string
          description: Human-readable label assigned at creation
        prefix:
          type: string
          description: First ~12 characters of the token for visual identification (e.g. "burk_pat_ab12")
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
          description: ISO-8601 timestamp of the most recent successful use; null if never used
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the token was created

    PersonalAccessTokenCreated:
      type: object
      description: |
        Response body returned when a personal access token is created (201).
        The `token` field contains the full plaintext secret — it is returned
        exactly once and cannot be retrieved again.
      required: [id, name, prefix, token, createdAt]
      properties:
        id:
          type: string
          description: Unique token ID (cuid)
        name:
          type: string
          description: Human-readable label
        prefix:
          type: string
          description: First ~12 characters for visual identification
        token:
          type: string
          description: |
            Full plaintext token (`burk_pat_` + 43 base64url chars).
            Store this value securely — it will not be shown again.
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the token was created

    TokenList:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/PersonalAccessToken"

    ExportedNote:
      type: object
      description: A single item rendered as an Obsidian-ready markdown note.
      required: [itemId, title, filename, markdown]
      properties:
        itemId:
          type: string
          description: ID of the source item (cuid); also the `burkmakId` in the note's YAML frontmatter
        title:
          type: ["string", "null"]
          description: Item title (may be null if metadata extraction is not yet complete)
        filename:
          type: string
          description: |
            Stable, filesystem-safe filename including the `.md` extension
            (e.g. `the-case-for-reading-slowly-cmqd.md`). Derived from the
            slugified title + a short id suffix; stable for a given item so
            the Obsidian plugin can overwrite the same file on re-sync.
        markdown:
          type: string
          description: |
            Full markdown content including YAML frontmatter, article
            metadata, excerpt, and highlight blockquotes.

    ExportBundle:
      type: object
      description: Collection of markdown-rendered notes returned by the bulk export endpoint.
      required: [notes]
      properties:
        notes:
          type: array
          items:
            $ref: "#/components/schemas/ExportedNote"
