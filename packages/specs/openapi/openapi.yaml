openapi: 3.1.0
info:
  title: App API
  version: 0.4.0
  description: |
    Spec-first HTTP API. Paths include the versioned prefix (`/api/v1`) so
    generated clients can be used without additional base-URL rewriting.

    **Authentication endpoints** live under `/api/v1/auth/*` and follow the
    [Better Auth protocol](https://www.better-auth.com/docs). They are
    deliberately not enumerated here: Better Auth owns that wire contract and
    evolves it independently of our OpenAPI surface. The `cookieAuth` and
    `bearerAuth` security schemes documented below describe how the *rest* of
    this API accepts credentials issued by that namespace — session cookies
    (web) and bearer tokens (mobile, via the `bearer` plugin).

    **Kobo native-sync endpoints** live under `/api/v1/kobo/{token}/*` and
    emulate the proprietary Kobo store API (`/v1/initialization`,
    `/v1/library/sync`, reading state, covers, KEPUB download) so a stock Kobo
    pointed at that mount via `api_endpoint` in `Kobo eReader.conf`
    auto-syncs extracted articles. Like the auth namespace, they are not
    enumerated here: the wire contract is Kobo's (device-defined, JSON,
    case-sensitive), authenticated by a personal access token embedded in the
    path because the device cannot send auth headers. No generated client
    consumes them.
  contact:
    name: App Team
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.example.com
    description: Production (placeholder)
tags:
  - name: system
    description: Health and liveness endpoints
  - name: events
    description: Server-Sent Events stream
  - name: items
    description: Saved reading-list items
  - name: tags
    description: User-defined item tags
  - name: extraction
    description: Article content extraction and cached images
  - name: highlights
    description: Reader highlights on saved items
  - name: tokens
    description: Personal access tokens for headless client authentication (Kobo, Obsidian)
  - name: kobo
    description: OPDS catalog feed and EPUB download for Kobo and other OPDS readers
  - name: export
    description: Obsidian-compatible markdown export of items and highlights

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Service health probe
      description: |
        Reports health status of the service and its database dependency.
      tags: [system]
      responses:
        "200":
          description: Service and all dependencies are operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
        "503":
          description: One or more dependencies are degraded or down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                degraded:
                  value:
                    status: down
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: down

  /api/v1/events:
    get:
      operationId: streamEvents
      summary: Server-Sent Events stream of the caller's item and job updates
      description: |
        Long-lived `text/event-stream` connection. Each message is a JSON
        payload `{ "type": ..., "data": ... }` describing an item or job change
        for the authenticated user. A periodic `ping` event acts as a heartbeat.
        Requires an active Better Auth session.
      tags: [events]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: An open event stream.
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                update:
                  value: |
                    data: {"type":"item.updated","data":{"id":"itm_1"}}
        "401":
          description: No active session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /api/v1/items:
    get:
      operationId: listItems
      summary: List saved items with optional filtering
      description: Returns a cursor-paginated list of the authenticated user's saved items. Supports filtering by read state, tag, favourite flag, and full-text search.
      tags: [items]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: readState
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReadState"
          description: Filter by read state
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Filter by tag slug
        - name: favorite
          in: query
          required: false
          schema:
            type: boolean
          description: Filter to favourites only
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Full-text search query
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor for the next page
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of items to return (1–100, default 20)
      responses:
        "200":
          description: Paginated list of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemList"
              examples:
                page1:
                  value:
                    items:
                      - id: clxabc123
                        url: https://example.com/article
                        canonicalUrl: null
                        title: "An interesting article"
                        siteName: "Example"
                        excerpt: "A short excerpt from the article."
                        leadImageUrl: null
                        faviconUrl: null
                        status: ready
                        extractStatus: ready
                        readState: unread
                        favorite: false
                        savedAt: "2026-06-13T10:00:00Z"
                        readAt: null
                        tags: ["tech", "reading"]
                    nextCursor: null
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session

    post:
      operationId: saveItem
      summary: Save a new URL to the reading list
      description: Creates an item with status `pending`. A background job is dispatched to fetch metadata (title, excerpt, images). The item becomes `ready` or `failed` asynchronously.
      tags: [items]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveItemRequest"
            examples:
              basic:
                value:
                  url: https://example.com/article
                  tags: ["tech"]
      responses:
        "201":
          description: Item created (metadata extraction is asynchronous; initial status is `pending`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              examples:
                created:
                  value:
                    id: clxabc123
                    url: https://example.com/article
                    canonicalUrl: null
                    title: null
                    siteName: null
                    excerpt: null
                    leadImageUrl: null
                    faviconUrl: null
                    status: pending
                    extractStatus: none
                    readState: unread
                    favorite: false
                    savedAt: "2026-06-13T10:00:00Z"
                    readAt: null
                    tags: ["tech"]
        "400":
          description: Request body invalid
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "url must be a valid URI"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session

  /api/v1/items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)

    get:
      operationId: getItem
      summary: Fetch a single item by ID
      description: Returns the full item record for the given ID, scoped to the authenticated user.
      tags: [items]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: The requested item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              examples:
                found:
                  value:
                    id: clxabc123
                    url: https://example.com/article
                    canonicalUrl: https://example.com/article
                    title: "An interesting article"
                    siteName: "Example"
                    excerpt: "A short excerpt."
                    leadImageUrl: https://example.com/img.jpg
                    faviconUrl: https://example.com/favicon.ico
                    status: ready
                    extractStatus: ready
                    readState: unread
                    favorite: false
                    savedAt: "2026-06-13T10:00:00Z"
                    readAt: null
                    tags: ["tech"]
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

    patch:
      operationId: updateItem
      summary: Update read state or favourite flag on an item
      description: Partially updates an item. At least one of `readState` or `favorite` must be provided. Setting `readState` to `read` for the first time records `readAt`.
      tags: [items]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
            examples:
              markRead:
                value:
                  readState: read
              favourite:
                value:
                  favorite: true
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              examples:
                updated:
                  value:
                    id: clxabc123
                    url: https://example.com/article
                    canonicalUrl: https://example.com/article
                    title: "An interesting article"
                    siteName: "Example"
                    excerpt: "A short excerpt."
                    leadImageUrl: null
                    faviconUrl: null
                    status: ready
                    extractStatus: ready
                    readState: read
                    favorite: false
                    savedAt: "2026-06-13T10:00:00Z"
                    readAt: "2026-06-13T11:00:00Z"
                    tags: ["tech"]
        "400":
          description: Request body invalid
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "readState must be one of: unread, read, archived"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

    delete:
      operationId: deleteItem
      summary: Permanently delete an item
      description: Permanently removes the item and all its tag associations. This operation cannot be undone.
      tags: [items]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "204":
          description: Item deleted successfully
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

  /api/v1/items/{id}/tags:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)

    post:
      operationId: addItemTag
      summary: Add a tag to an item (creates the tag if it does not exist)
      description: Attaches a tag to the item by slug. If the tag does not yet exist for this user it is created automatically and a slug is derived from the provided name.
      tags: [items]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTagRequest"
            examples:
              add:
                value:
                  tag: tech
      responses:
        "200":
          description: Item with updated tag list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              examples:
                tagged:
                  value:
                    id: clxabc123
                    url: https://example.com/article
                    canonicalUrl: null
                    title: "An interesting article"
                    siteName: "Example"
                    excerpt: null
                    leadImageUrl: null
                    faviconUrl: null
                    status: ready
                    extractStatus: none
                    readState: unread
                    favorite: false
                    savedAt: "2026-06-13T10:00:00Z"
                    readAt: null
                    tags: ["tech", "reading"]
        "400":
          description: Request body invalid
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "tag must be between 1 and 40 characters"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

  /api/v1/items/{id}/tags/{tagSlug}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)
      - name: tagSlug
        in: path
        required: true
        schema:
          type: string
        description: Tag slug to remove

    delete:
      operationId: removeItemTag
      summary: Remove a tag from an item
      description: Detaches the specified tag from the item. The tag record itself is not deleted; use `DELETE /api/v1/tags/{id}` for that.
      tags: [items]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "204":
          description: Tag removed from item
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

  /api/v1/items/{id}/article:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)

    get:
      operationId: getArticle
      summary: Get extracted article content for an item
      description: Returns the full extracted article body (HTML and plain text) for the given item. Returns 404 if the article has not been extracted yet.
      tags: [extraction]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Extracted article content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
              examples:
                extracted:
                  value:
                    contentHtml: "<p>Full article body in HTML.</p>"
                    contentText: "Full article body in plain text."
                    wordCount: 842
                    readingTimeMin: 4
                    extractedAt: "2026-06-14T08:00:00Z"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Article not yet extracted or item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Article for item clxabc123 is not available"
                    code: article-not-found

  /api/v1/items/{id}/extract:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)

    post:
      operationId: extractArticle
      summary: Trigger article content extraction for an item
      description: |
        Idempotent: always returns 202 and (re)starts extraction, replacing any
        existing article. No request body. Safe to call in any `extractStatus`
        state (`none`, `failed`, or `ready`). The item's `extractStatus`
        transitions to `extracting` immediately and becomes `ready` or `failed`
        asynchronously.
      tags: [extraction]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "202":
          description: Extraction job accepted; extractStatus is now `extracting`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractAccepted"
              examples:
                accepted:
                  value:
                    extractStatus: extracting
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

  /api/v1/items/{id}/epub:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)

    get:
      operationId: getItemEpub
      summary: Download an EPUB/KEPUB for a saved item
      description: |
        Builds (or returns a cached) EPUB3/KEPUB for the item's extracted
        article and streams it as `application/epub+zip`. The file is a
        `.kepub.epub` for optimal on-device progress tracking on Kobo.

        Requires a ready article (`extractStatus = ready`). Returns `409` if
        the article has not been extracted yet. Accepts session cookie, Better
        Auth bearer, **and** PAT HTTP Basic (password = `burk_pat_…`) so that
        OPDS/Kobo acquisition links work without an interactive session.
      tags: [kobo]
      security:
        - cookieAuth: []
        - bearerAuth: []
        - patBasicAuth: []
      responses:
        "200":
          description: |
            Raw EPUB bytes. `Content-Disposition: attachment; filename="<slug>.kepub.epub"`.
            No example is representable for binary content.
          headers:
            Content-Disposition:
              description: attachment; filename="<slug>.kepub.epub"
              schema:
                type: string
            X-Content-Type-Options:
              description: nosniff
              schema:
                type: string
          content:
            application/epub+zip:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found or not owned by the authenticated user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found
        "409":
          description: Article has not been extracted yet — trigger extraction first
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notReady:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: "Article for item clxabc123 is not yet extracted"
                    code: article-not-ready

  /api/v1/items/{id}/highlights:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)

    get:
      operationId: listHighlights
      summary: List all highlights on an item
      description: Returns all highlights the authenticated user has created on the given item.
      tags: [highlights]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: List of highlights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HighlightList"
              examples:
                list:
                  value:
                    highlights:
                      - id: clxhl001
                        itemId: clxabc123
                        quote: "Full article body in plain text."
                        prefix: "Returns the "
                        suffix: " for the given item."
                        note: null
                        color: yellow
                        createdAt: "2026-06-14T09:00:00Z"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

    post:
      operationId: createHighlight
      summary: Create a highlight on an item
      description: Saves a new text highlight (with optional note and color) on the given item.
      tags: [highlights]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHighlightRequest"
            examples:
              basic:
                value:
                  quote: "Full article body in plain text."
                  prefix: "Returns the "
                  suffix: " for the given item."
                  color: yellow
              withNote:
                value:
                  quote: "Full article body in plain text."
                  prefix: "Returns the "
                  suffix: " for the given item."
                  note: "Important paragraph"
                  color: green
      responses:
        "201":
          description: Highlight created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Highlight"
              examples:
                created:
                  value:
                    id: clxhl001
                    itemId: clxabc123
                    quote: "Full article body in plain text."
                    prefix: "Returns the "
                    suffix: " for the given item."
                    note: null
                    color: yellow
                    createdAt: "2026-06-14T09:00:00Z"
        "400":
          description: Request body invalid
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "quote is required"
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Item not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Item clxabc123 does not exist"
                    code: item-not-found

  /api/v1/items/{id}/image/{key}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID (cuid)
      - name: key
        in: path
        required: true
        schema:
          type: string
        description: |
          Opaque image key assigned by the extraction job. Clients MUST NOT
          construct this value: the extraction job rewrites `<img src>` URLs
          inside `Article.contentHtml` to `/api/v1/items/{id}/image/{key}`
          paths, so clients only ever follow keys that already appear in the
          article HTML.

    get:
      operationId: getItemImage
      summary: Retrieve a cached image associated with an item
      description: Streams a cached image file that was downloaded during article extraction. Returns 404 if the image key does not exist or is not owned by the authenticated user.
      tags: [extraction]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: |
            Raw cached image bytes. The `Content-Type` header reflects the
            original media type of the image. No example is representable for
            binary content; follow the URL directly in a browser or image view.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
                    detail: No active session
        "404":
          description: Image not found or not owned by the authenticated user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Image abc123.jpg does not exist"
                    code: image-not-found

