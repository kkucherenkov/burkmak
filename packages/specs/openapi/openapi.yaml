openapi: 3.1.0
info:
  title: App API
  version: 0.1.0
  description: |
    Spec-first HTTP API. Paths include the versioned prefix (`/api/v1`) so
    generated clients can be used without additional base-URL rewriting.

    **Authentication endpoints** live under `/api/v1/auth/*` and follow the
    [Better Auth protocol](https://www.better-auth.com/docs). They are
    deliberately not enumerated here: Better Auth owns that wire contract and
    evolves it independently of our OpenAPI surface. The `cookieAuth` and
    `bearerAuth` security schemes documented below describe how the *rest* of
    this API accepts credentials issued by that namespace — session cookies
    (web) and bearer tokens (mobile, via the `bearer` plugin).
  contact:
    name: App Team
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.example.com
    description: Production (placeholder)
tags:
  - name: system
    description: Health and liveness endpoints
  - name: realtime
    description: Centrifugo connection tokens

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Service health probe
      description: |
        Reports combined health status of the service and its runtime
        dependencies (database, cache, realtime bus).
      tags: [system]
      responses:
        "200":
          description: Service and all dependencies are operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
                      redis: ok
                      centrifugo: ok
        "503":
          description: One or more dependencies are degraded or down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                degraded:
                  value:
                    status: degraded
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
                      redis: degraded
                      centrifugo: ok

  /api/v1/realtime/token:
    post:
      operationId: issueRealtimeToken
      summary: Issue a short-lived Centrifugo connection token
      description: |
        Mints a short-lived HMAC-signed JWT that the client can use to connect
        to Centrifugo. Requires an active Better Auth session (cookie on web,
        bearer token on mobile).
      tags: [realtime]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeToken"
              examples:
                ok:
                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    expiresAt: "2026-04-18T12:05:00Z"
        "401":
          description: No active session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Better Auth bearer token
  schemas:
    DependencyStatus:
      type: ["string", "null"]
      enum: [ok, degraded, down]

    HealthStatus:
      type: object
      required: [status, version, uptimeSeconds, dependencies]
      properties:
        status:
          $ref: "#/components/schemas/DependencyStatus"
        version:
          type: ["string", "null"]
          description: Semantic version of the running backend build
        uptimeSeconds:
          type: integer
          minimum: 0
          description: Seconds since the backend process started
        dependencies:
          type: object
          required: [db, redis, centrifugo]
          properties:
            db:
              $ref: "#/components/schemas/DependencyStatus"
            redis:
              $ref: "#/components/schemas/DependencyStatus"
            centrifugo:
              $ref: "#/components/schemas/DependencyStatus"

    Problem:
      type: object
      description: RFC 9457 problem details
      required: [type, title, status]
      properties:
        type:
          type: ["string", "null"]
          format: uri
          default: about:blank
        title:
          type: ["string", "null"]
        status:
          type: integer
          format: int32
        detail:
          type: ["string", "null"]
        instance:
          type: ["string", "null"]
        code:
          type: ["string", "null"]

    RealtimeToken:
      type: object
      required: [token, expiresAt]
      properties:
        token:
          type: ["string", "null"]
          description: Short-lived HMAC-signed JWT for Centrifugo
        expiresAt:
          type: ["string", "null"]
          format: date-time
          description: ISO-8601 instant when the token expires
