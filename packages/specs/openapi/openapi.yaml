                    <?xml version="1.0" encoding="UTF-8"?>
                    <OpenSearchDescription xmlns="http://a9.com/-/spec/opensearch/1.1/">
                      <ShortName>burkmak</ShortName>
                      <Description>Search your saved articles</Description>
