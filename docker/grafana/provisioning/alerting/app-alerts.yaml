# Grafana alerting rules provisioned for local development.
# These are informational — no notification channel is wired locally.
# In production, wire the contact point to PagerDuty / Slack via env vars.
apiVersion: 1

groups:
  - orgId: 1
    name: backend
    folder: App
    interval: 1m
    rules:
      - uid: backend-error-rate
        title: "High error rate (5xx > 1%)"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
                /
                sum(rate(http_server_requests_seconds_count[5m]))
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0.01]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Error rate above 1% for 5 minutes"
        labels:
          severity: warning

      - uid: backend-p99-latency
        title: "P99 latency > 2s"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: |
                histogram_quantile(0.99,
                  sum by(le) (rate(http_server_requests_seconds_bucket[5m])))
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "P99 response time above 2s for 5 minutes"
        labels:
          severity: warning

      - uid: backend-down
        title: "Backend health check failing"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: "up{job='backend'}"
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              expression: A
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 1m
        annotations:
          summary: "Backend is not responding to health checks"
        labels:
          severity: critical
