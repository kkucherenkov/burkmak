name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  FLUTTER_VERSION: "3.41.0"

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage enforcement)
        run: pnpm test:coverage

  # ── Web ────────────────────────────────────────────────────────────────────
  web:
    name: Web (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # ── Spec validation ────────────────────────────────────────────────────────
  specs:
    name: OpenAPI spec validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate specs
        run: pnpm spec:validate

      - name: Bundle specs
        run: pnpm spec:bundle

  # ── Codegen drift guard ────────────────────────────────────────────────────
  codegen-drift:
    name: Codegen drift guard
    runs-on: ubuntu-latest
    needs: specs

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate clients
        run: pnpm spec:codegen

      - name: Fail if generated clients drifted from committed sources
        run: |
          git diff --exit-code -- packages/api-client-ts packages/api-client-dart \
            || (echo '::error::Generated clients are out of date. Run `pnpm spec:codegen` locally and commit the diff.' && exit 1)

  # ── UI library (lint · typecheck · test · build · audit) ───────────────────
  ui:
    name: UI library (lint · typecheck · test · build · audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @app/ui imports tokens.generated.{css,ts}; these are gitignored codegen.
      - name: Build design tokens
        run: pnpm design:build

      - name: Lint
        run: pnpm --filter @app/ui lint

      - name: Typecheck
        run: pnpm --filter @app/ui typecheck

      - name: Test
        run: pnpm --filter @app/ui test

      # WHY build: vue-tsc/vitest don't compile component SCSS through Dart Sass;
      # only `vite build` does. The other steps would pass on a broken stylesheet
      # (see T-2026-06-14-013), so the build is a required gate, not optional.
      - name: Build (compiles SCSS via Dart Sass — catches library style errors)
        run: pnpm --filter @app/ui build

      - name: Audit components (story + spec completeness)
        run: pnpm --filter @app/ui audit:components

  # ── Security audit ─────────────────────────────────────────────────────────
  security-audit:
    name: Security audit (deps + secrets + licenses)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm audit` is unusable: it calls the npm registry's quick-audit endpoint
      # (and its fallback), both of which now return 410 "This endpoint is being
      # retired. Use the bulk advisory endpoint instead." pnpm has not migrated to
      # the bulk endpoint — verified failing on 10.33.0 (ours), 10.34.5 and 11.13.0
      # (latest), so there is no version to upgrade to. Trivy reads pnpm-lock.yaml
      # natively and `severity: CRITICAL` preserves the bar `--audit-level=critical`
      # set. Revisit if pnpm/pnpm ships bulk-endpoint support.
      - name: Dependency vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: pnpm-lock.yaml
          scanners: vuln
          severity: CRITICAL
          exit-code: "1"

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # On PR: diff PR base → HEAD. On push: diff previous commit → HEAD.
          # Avoid BASE==HEAD which trufflehog rejects with exit 1.
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

      - name: License compliance check
        run: pnpm dlx license-checker --excludePrivatePackages --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0;CC-BY-3.0;CC-BY-4.0'
