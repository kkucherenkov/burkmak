name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build-images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: burkmak-backend
            dockerfile: apps/backend/Dockerfile
          - image: burkmak-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # Semver tag from the git tag; the default flavor also adds
          # `latest` for non-prerelease versions.
          tags: |
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  github-release:
    name: Create GitHub Release
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Docker images (linux/amd64 + linux/arm64):
          - \`ghcr.io/kkucherenkov/burkmak-backend:${GITHUB_REF_NAME#v}\`
          - \`ghcr.io/kkucherenkov/burkmak-web:${GITHUB_REF_NAME#v}\`

          Homelab install guide: [deploy/README.md](https://github.com/kkucherenkov/burkmak/blob/main/deploy/README.md)"
