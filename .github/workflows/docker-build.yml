name: Docker build check

on:
  pull_request:
    paths:
      - apps/backend/Dockerfile
      - apps/web/Dockerfile
      - deploy/**
      - .github/workflows/release.yml
      - .github/workflows/docker-build.yml
      - pnpm-lock.yaml
      - apps/backend/prisma/**
      - .dockerignore
      - package.json
  push:
    branches: [main]
    paths:
      - apps/backend/Dockerfile
      - apps/web/Dockerfile
      - deploy/**
      - .github/workflows/release.yml
      - .github/workflows/docker-build.yml
      - pnpm-lock.yaml
      - apps/backend/prisma/**
      - .dockerignore
      - package.json

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Smoke build ${{ matrix.image }} (amd64)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: burkmak-backend
            dockerfile: apps/backend/Dockerfile
          - image: burkmak-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          # Post-merge main builds (this workflow's push trigger) warm the
          # gha cache that release tag builds read; PR-ref caches are
          # branch-isolated and unreadable from tag pushes.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
